<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLM Globe</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111318;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    h1 { font-size: 1.2rem; margin: 0 0 8px 0; }
    p { color: #999; margin: 0 0 12px 0; }
    b { color: white; }
  </style>
</head>
<body>
  <h1>Who Else is Pulling a Career Limiting Maneuver?</h1>
  <p id="counter">&nbsp;</p>
  <canvas id="globe-canvas" style="width: 100%; max-width: 400px; aspect-ratio: 1;"></canvas>
  
  <script type="module">
    import createGlobe from '/dist/cobe-bundle.js';
    
    let counter = 0;
    const counterEl = document.getElementById('counter');
    
    // Simple marker simulation (without PartySocket for now)
    const markers = [];
    
    const canvas = document.getElementById('globe-canvas');
    let phi = 0;
    
    const globe = createGlobe(canvas, {
      devicePixelRatio: 2,
      width: 400 * 2,
      height: 400 * 2,
      phi: 0,
      theta: 0,
      dark: 1,
      diffuse: 0.8,
      mapSamples: 16000,
      mapBrightness: 6,
      baseColor: [0.3, 0.3, 0.3],
      markerColor: [0.8, 0.1, 0.1],
      glowColor: [0.2, 0.2, 0.2],
      markers: [],
      opacity: 0.7,
      onRender: (state) => {
        state.markers = markers;
        state.phi = phi;
        phi += 0.01;
      },
    });
    
    // Add a random marker every few seconds for demo
    setInterval(() => {
      markers.push({
        location: [Math.random() * 180 - 90, Math.random() * 360 - 180],
        size: 0.05
      });
      counter++;
      counterEl.innerHTML = `<b>${counter}</b> ${counter === 1 ? 'person' : 'people'} limiting their career outlooks.`;
    }, 3000);
  </script>
</body>
</html>
