name = "career-limiting-maneuver"
main = "dist/_worker.js/index.js"
compatibility_date = "2025-07-30"
compatibility_flags = ["nodejs_compat", "enable_ctx_exports"]
upload_source_maps = true
routes = [
  { pattern = "careerlimitingmaneuver.com", zone_name = "careerlimitingmaneuver.com", custom_domain = true }
]

[observability]
enabled = true

[assets]
directory = "./dist"
binding = "ASSETS"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "Globe", class_name = "Globe" }
]

[[kv_namespaces]]
binding = "REPORTS_KV"
id = "d6b3c2736534491ab9a3dc1f32a82eec"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Globe"]
